# .github/workflows/theme-doctor-dashboard.yml
# Publish Theme Doctor dashboard to GitHub Pages after each main run.

name: Theme Doctor — Publish Dashboard

on:
  workflow_run:
    workflows: ['Theme Doctor']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: theme-doctor-reports-*
          path: reports/
          merge-multiple: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Theme Doctor
        run: npm install -g theme-doctor

      - name: Build dashboard
        run: theme-doctor dashboard build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
